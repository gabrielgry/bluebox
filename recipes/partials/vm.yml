---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: files
    files:
      - source: system/vm
        destination: /

  - type: dnf
    install:
      packages:
        - virt-install
        - libvirt-daemon-config-network
        - libvirt-daemon-kvm
        - qemu-kvm
        - virt-manager
        - virt-viewer
        - libvirt-nss
        - qemu
        - qemu-char-spice
        - qemu-device-display-virtio-gpu
        - qemu-device-display-virtio-vga
        - qemu-device-usb-redirect
        - qemu-img
        - qemu-system-x86-core
        - qemu-user-binfmt
        - qemu-user-static
        - virt-v2v

  - type: systemd
    system:
      enabled:
        - bluebox-libvirt-group.service
        - bluebox-libvirt-workaround.service
